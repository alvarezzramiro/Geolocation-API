services:

  neo4j:
    image: neo4j:5.18
    container_name: street-neo4j
    ports:
      - "7474:7474"   # Interfaz web (Neo4j Browser)
      - "7687:7687"   # Protocolo Bolt (lo usa el driver de Go)
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["graph-data-science"]
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7.2-alpine
    container_name: street-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  neo4j_data:
  redis_data: